<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Référentiel Parlementaire — IIIe République</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --muted: #6b6b6b;
      --line: #000000;
      --active-fill: #f0f7ff;
      --font-main: "Inter", sans-serif;
      --line-width: 1px;
      --gap: 4px; /* Écartement ajusté : moins petit qu'avant, fidèle à Problemata */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      font-size: 14px;
      line-height: 1.4;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- SIDEBAR --- */
    aside {
      width: 340px;
      min-width: 340px;
      padding: 30px;
      position: sticky;
      top: 0;
      height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    /* Ligne latérale disjointe */
    aside::after {
      content: ""; position: absolute; right: 0;
      top: var(--gap); bottom: var(--gap);
      width: var(--line-width); background: var(--line);
    }

    .hero-title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    /* --- FILTRES (BOÎTES BLANCHES DISJOINTES) --- */
    .filter-group { margin-bottom: 25px; position: relative; }

    .filter-box-wrapper {
      display: flex;
      align-items: center;
      position: relative;
      min-height: 42px;
      background: #ffffff;
    }

    /* FIX: Suppression du background noir qui remplissait la boîte */
    .filter-box-wrapper::before, .filter-box-wrapper::after {
      content: ""; position: absolute; pointer-events: none;
    }
    .filter-box-wrapper::before {
      top: 0; bottom: 0; left: var(--gap); right: var(--gap);
      border-top: var(--line-width) solid var(--line); border-bottom: var(--line-width) solid var(--line);
    }
    .filter-box-wrapper::after {
      left: 0; right: 0; top: var(--gap); bottom: var(--gap);
      border-left: var(--line-width) solid var(--line); border-right: var(--line-width) solid var(--line);
    }

    .filter-box-wrapper.active { background-color: var(--active-fill); }

    .filter-line {
      flex: 1; border: none; padding: 12px; font-family: var(--font-main);
      font-size: 13px; font-weight: 500; outline: none;
      text-transform: uppercase; background: transparent; position: relative; z-index: 2;
    }

    .sort-btn {
      background: none; border: none; padding: 0 10px; cursor: pointer; color: var(--muted);
      height: 25px; display: flex; align-items: center; position: relative; z-index: 2;
      border-left: var(--line-width) solid var(--line); margin-right: 6px;
    }

    /* --- DATE PICKER --- */
    .date-trigger-box {
      cursor: pointer; font-size: 13px; color: var(--muted);
      padding: 12px; flex: 1; text-transform: uppercase; position: relative; z-index: 2;
    }

    .wheel-overlay {
      display: none; position: absolute; top: 100%; left: 0; right: 0;
      background: #fff; border: var(--line-width) solid var(--line); z-index: 110; padding: 10px;
    }
    .wheel-overlay.active { display: block; }

    .ios-wheel-container {
      display: flex; height: 120px; position: relative;
      mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
    }
    .wheel-highlight { position: absolute; top: 45px; height: 30px; width: 100%; pointer-events: none; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; }
    .ios-wheel { flex: 1; overflow-y: auto; scroll-snap-type: y mandatory; scrollbar-width: none; padding: 45px 0; }
    .ios-wheel::-webkit-scrollbar { display: none; }
    .wheel-item { height: 30px; line-height: 30px; text-align: center; scroll-snap-align: center; font-size: 13px; opacity: 0.4; }
    .wheel-item.active { opacity: 1; font-weight: 700; }

    .btn-reset-ghost {
      background: none; border: none; color: var(--muted); padding: 10px 0;
      font-family: var(--font-main); font-weight: 700; font-size: 11px;
      text-transform: uppercase; cursor: pointer; text-align: left;
    }
    .btn-reset-ghost:hover { color: var(--text); }

    /* --- RÉSULTATS --- */
    main { flex: 1; min-width: 0; background: var(--bg); }

    .person-row {
      display: grid;
      grid-template-columns: 220px 1fr 1.5fr;
      position: relative;
      height: 210px;
      overflow: hidden;
    }

    /* Ligne horizontale disjointe */
    .person-row::after {
      content: ""; position: absolute; bottom: 0;
      left: var(--gap); right: var(--gap);
      height: var(--line-width); background: var(--line);
    }

    .person-row.expanded { height: auto; overflow: visible; }

    .portrait-outer {
        padding: 20px; position: relative; height: 210px;
    }
    /* Ligne verticale 1 disjointe */
    .portrait-outer::after {
      content: ""; position: absolute; right: 0;
      top: var(--gap); bottom: var(--gap);
      width: var(--line-width); background: var(--line);
    }

    .portrait-box {
      width: 100%; height: 100%;
      background-image: url('no_picture.jpg');
      background-size: cover; background-position: center;
      position: relative; overflow: hidden;
    }
    .portrait-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

    .identity-box {
      padding: 30px; position: relative;
      display: flex; flex-direction: column; justify-content: flex-start;
      height: 210px;
    }
    /* Ligne verticale 2 disjointe */
    .identity-box::after {
      content: ""; position: absolute; right: 0;
      top: var(--gap); bottom: var(--gap);
      width: var(--line-width); background: var(--line);
    }

    .identity-box .lastname {
      font-size: 28px; font-weight: 700; text-transform: uppercase;
      line-height: 1; margin-bottom: 12px; letter-spacing: -0.02em;
    }

    .links-box { display: flex; flex-wrap: wrap; gap: 12px; margin-top: auto; }
    .links-box a {
      text-decoration: none !important; color: var(--text); font-size: 10px; font-weight: 700;
      text-transform: uppercase; display: flex; align-items: center; gap: 4px;
    }

    .mandates-box { padding: 30px; position: relative; }
    .mandates-inner {
        display: flex; flex-direction: column; justify-content: center;
        height: 100%; gap: 25px;
    }

    .mandate-entry { font-size: 15px; line-height: 1.4; }
    .mandate-entry b { font-weight: 700; font-size: 13px; text-transform: uppercase; display: block; margin-bottom: 4px; }
    .mandate-entry.hidden-mandate { display: none; }
    .person-row.expanded .mandate-entry.hidden-mandate { display: block; }
    .person-row.expanded .mandates-inner { justify-content: flex-start; }

    /* --- BOUTON EXPAND DISJOINT --- */
    .unfold-btn {
      position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
      cursor: pointer; width: 28px; height: 28px; background: #ffffff;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .unfold-btn::before {
        content: ""; position: absolute; top: 0; bottom: 0; left: var(--gap); right: var(--gap);
        border-top: var(--line-width) solid var(--line); border-bottom: var(--line-width) solid var(--line);
    }
    .unfold-btn::after {
        content: ""; position: absolute; left: 0; right: 0; top: var(--gap); bottom: var(--gap);
        border-left: var(--line-width) solid var(--line); border-right: var(--line-width) solid var(--line);
    }

    .icon-svg { width: 10px; height: 10px; stroke: currentColor; stroke-width: 2.5; fill: none; transition: transform 0.3s; position: relative; z-index: 2; }
    .person-row.expanded .unfold-btn svg { transform: rotate(90deg); }

    .pagination { padding: 40px; display: flex; gap: 15px; }
    .btn-page { background: none; border: var(--line-width) solid var(--line); padding: 8px 20px; cursor: pointer; font-weight: 700; font-size: 11px; text-transform: uppercase; }

    /* --- PERMALINK ROW HOVER --- */
    .person-row { cursor: pointer; transition: background 0.15s; }
    .person-row:hover { background: var(--active-fill); }

    /* --- DETAIL OVERLAY --- */
    #detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(255,255,255,0.96);
      overflow-y: auto;
    }
    #detail-overlay.active { display: block; }

    .detail-inner {
      max-width: 900px; margin: 0 auto; padding: 60px 40px;
    }

    .detail-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 50px;
    }
    .detail-back {
      background: none; border: none; cursor: pointer; font-family: var(--font-main);
      font-weight: 700; font-size: 11px; text-transform: uppercase; display: flex;
      align-items: center; gap: 6px;
    }
    .detail-permalink {
      font-size: 11px; font-weight: 500; color: var(--muted); font-family: var(--font-main);
      display: flex; align-items: center; gap: 6px; text-decoration: none;
      text-transform: uppercase;
    }
    .detail-permalink:hover { color: var(--text); }
    .copy-toast {
      display: inline-block; font-size: 10px; font-weight: 700; color: var(--text);
      text-transform: uppercase; opacity: 0; transition: opacity 0.3s;
    }
    .copy-toast.visible { opacity: 1; }

    .detail-header { display: grid; grid-template-columns: 180px 1fr; gap: 0; margin-bottom: 50px; position: relative; }
    .detail-header::after { content: ""; position: absolute; bottom: -25px; left: var(--gap); right: var(--gap); height: var(--line-width); background: var(--line); }

    .detail-portrait {
      width: 160px; height: 200px; background: #f5f5f5;
      overflow: hidden; position: relative;
    }
    .detail-portrait::before { content: ""; position: absolute; top: 0; bottom: 0; left: var(--gap); right: var(--gap); border-top: var(--line-width) solid var(--line); border-bottom: var(--line-width) solid var(--line); pointer-events: none; z-index: 2; }
    .detail-portrait::after { content: ""; position: absolute; left: 0; right: 0; top: var(--gap); bottom: var(--gap); border-left: var(--line-width) solid var(--line); border-right: var(--line-width) solid var(--line); pointer-events: none; z-index: 2; }
    .detail-portrait img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

    .detail-identity { padding-left: 40px; }
    .detail-firstname { font-size: 14px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .detail-lastname { font-size: 48px; font-weight: 800; text-transform: uppercase; line-height: 1; letter-spacing: -0.03em; margin-bottom: 20px; }
    .detail-meta { font-size: 13px; color: var(--muted); line-height: 1.8; }
    .detail-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
    .detail-links a { text-decoration: none; color: var(--text); font-size: 10px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }

    .detail-mandates { margin-top: 50px; }
    .detail-mandates-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 20px; }
    .detail-mandate-item {
      display: grid; grid-template-columns: 200px 1fr;
      padding: 18px 0; position: relative;
    }
    .detail-mandate-item::after { content: ""; position: absolute; bottom: 0; left: var(--gap); right: var(--gap); height: var(--line-width); background: var(--line); }
    .detail-mandate-dates { font-size: 12px; color: var(--muted); font-weight: 500; }
    .detail-mandate-info { font-size: 14px; }
    .detail-mandate-info b { display: block; font-weight: 700; font-size: 13px; text-transform: uppercase; margin-bottom: 4px; }
  </style>
</head>
<body>

  <aside>
    <h1 class="hero-title">Retrouvez les parlementaires de la IIIe République</h1>

    <div class="filter-group">
      <div class="filter-box-wrapper" id="box-last">
        <input type="text" class="filter-line" id="f-last" placeholder="NOM">
        <button class="sort-btn" id="sort-last" data-sort="last_name">
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-box-wrapper" id="box-first">
        <input type="text" class="filter-line" id="f-first" placeholder="PRÉNOM">
        <button class="sort-btn" id="sort-first" data-sort="first_name">
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-box-wrapper" id="box-regime">
        <input type="text" class="filter-line" id="f-regime" placeholder="RÉGIME POLITIQUE">
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-box-wrapper" id="box-pos">
        <input type="text" class="filter-line" id="f-pos" placeholder="POSITION">
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-box-wrapper" id="box-date">
        <div class="date-trigger-box" id="date-trigger">en exercice le <span id="date-display">--</span></div>
        <div class="wheel-overlay" id="date-overlay">
          <div class="date-picker-ui" style="display:flex; gap:5px; height:100px; overflow:hidden;">
            <select id="f-day" class="date-select" style="flex:1; border:none;"></select>
            <select id="f-month" class="date-select" style="flex:1; border:none;"></select>
            <select id="f-year" class="date-select" style="flex:1; border:none;"></select>
          </div>
          <button class="btn-page" id="close-date" style="width:100%; border:none; border-top:1px solid black; margin-top:10px;">Valider</button>
        </div>
      </div>
    </div>

    <button id="btn-reset" class="btn-reset-ghost">réinitialiser les filtres</button>
  </aside>

  <main>
    <section id="results"></section>
    <div class="pagination">
      <button id="prev-btn" class="btn-page">Précédent</button>
      <button id="next-btn" class="btn-page">Suivant</button>
    </div>
  </main>

  <!-- DETAIL OVERLAY -->
  <div id="detail-overlay">
    <div class="detail-inner">
      <div class="detail-nav">
        <button class="detail-back" id="detail-back">
          <svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Retour à la liste
        </button>
        <span>
          <a class="detail-permalink" id="detail-permalink-btn" href="#">
            <svg style="width:10px;height:10px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            Copier le lien permanent
          </a>
          <span class="copy-toast" id="copy-toast">✓ Copié</span>
        </span>
      </div>
      <div id="detail-content">
        <div style="padding: 80px; text-align:center; color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em;">Chargement…</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const state = {
      filters: { last_name: '', first_name: '', legislature_name: '', position: '', start_from: '' },
      sortBy: 'last_name', sortDir: 'asc', limit: 20, offset: 0
    };

    const SVG_LINK = `<svg style="width:10px;height:10px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>`;
    const SVG_ARROW = `<svg class="icon-svg" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>`;

    async function load() {
      const params = new URLSearchParams();
      Object.entries(state.filters).forEach(([k, v]) => {
        if (v) params.append(k, v);

        // Gestion de la classe active sans erreur
        let boxId = '';
        if (k === 'legislature_name') boxId = 'box-regime';
        else if (k === 'position') boxId = 'box-pos';
        else if (k === 'start_from') boxId = 'box-date';
        else boxId = 'box-' + k.split('_')[0];

        const box = document.getElementById(boxId);
        if (box) {
          if (v) box.classList.add('active');
          else box.classList.remove('active');
        }
      });

      params.append('sort_by', state.sortBy);
      params.append('sort_dir', state.sortDir);
      params.append('limit', state.limit);
      params.append('offset', state.offset);

      try {
        const res = await fetch(`${API_BASE}/persons/grouped-mandates?${params}`);
        if (!res.ok) throw new Error("API Error");
        const data = await res.json();
        render(data.items || []);

        document.getElementById('prev-btn').disabled = state.offset === 0;
        document.getElementById('next-btn').disabled = (state.offset + state.limit) >= (data.total_groups || 0);
      } catch (err) {
        console.error(err);
      }
    }

    function render(items) {
      const container = document.getElementById('results');
      container.innerHTML = items.map(item => {
        const p = item.person;
        return `
          <div class="person-row" id="row-${p.person_id}" onclick="openDetail('${p.person_id}', event)">
            <div class="portrait-outer">
                <div class="portrait-box" id="img-${p.person_id}"></div>
            </div>
            <div class="identity-box">
              <div class="firstname">${p.first_name || ''}</div>
              <div class="lastname">${p.last_name}</div>
              <div class="bio">Né le ${formatDate(p.birth_date)}<br>Mort le ${formatDate(p.death_date)}</div>
              <div class="links-box">
                ${p.wikipedia_url ? `<a href="${p.wikipedia_url}" target="_blank">Wikipedia ${SVG_LINK}</a>` : ''}
                ${p.wikidata_qid ? `<a href="https://www.wikidata.org/wiki/${p.wikidata_qid}" target="_blank">Wikidata ${SVG_LINK}</a>` : ''}
                ${p.sycomore_id ? `<a href="https://www2.assemblee-nationale.fr/sycomore/fiche/(num_dept)/${p.sycomore_id}" target="_blank">A.N. ${SVG_LINK}</a>` : ''}
              </div>
            </div>
            <div class="mandates-box">
              <div class="mandates-inner">
                ${item.mandates.map((m, index) => {
                  const inst = (m.institution || '').toLowerCase();
                  let role = inst.includes('senat') ? `sénateur du ${m.position}` : inst.includes('chambre') ? `député du ${m.position}` : m.position;
                  return `<div class="mandate-entry ${index >= 2 ? 'hidden-mandate' : ''}">
                    <b>Régime politique : ${m.legislature_name}</b>
                    Position : ${role}<br>
                    En exercice du ${formatDate(m.start_date)} jusqu'au ${formatDate(m.end_date)}
                  </div>`;
                }).join('')}
              </div>
              ${item.mandates.length > 2 ? `<div class="unfold-btn" onclick="toggleExpand('${p.person_id}')">${SVG_ARROW}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      items.forEach(async item => {
        const url = await getWikiImg(item.person.wikidata_qid);
        const box = document.getElementById(`img-${item.person.person_id}`);
        if(url && box) box.innerHTML = `<img src="${url}">`;
      });
    }

    async function getWikiImg(qid) {
      if(!qid) return null;
      try {
        const r = await fetch(`https://www.wikidata.org/w/api.php?action=wbgetclaims&property=P18&entity=${qid}&format=json&origin=*`);
        const d = await r.json();
        const f = d.claims.P18[0].mainsnak.datavalue.value.replace(/ /g, '_');
        return `https://commons.wikimedia.org/wiki/Special:FilePath/${f}?width=300`;
      } catch(e) { return null; }
    }

    function formatDate(s) { return s ? new Date(s).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'}) : 'indisponible'; }
    window.toggleExpand = (id) => document.getElementById(`row-${id}`).classList.toggle('expanded');

    /* --- BINDINGS RESTAURÉS --- */
    document.getElementById('date-trigger').addEventListener('click', () => {
        document.getElementById('date-overlay').classList.toggle('active');
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const target = e.currentTarget;
            const key = target.dataset.sort;
            const icon = target.querySelector('svg');

            if (state.sortBy === key) {
              state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
            } else {
              state.sortBy = key;
              state.sortDir = 'asc';
            }

            document.querySelectorAll('.sort-btn svg').forEach(s => s.style.transform = 'rotate(0deg)');
            document.querySelectorAll('.sort-btn').forEach(s => s.classList.remove('active'));

            target.classList.add('active');
            icon.style.transform = state.sortDir === 'asc' ? 'rotate(0deg)' : 'rotate(180deg)';

            state.offset = 0;
            load();
        });
    });

    ['f-last', 'f-first', 'f-regime', 'f-pos'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            const key = id.replace('f-', '').replace('last','last_name').replace('first','first_name').replace('regime','legislature_name').replace('pos','position');
            state.filters[key] = e.target.value;
            state.offset = 0;
            load();
        });
    });

    document.getElementById('close-date').addEventListener('click', (e) => {
        e.stopPropagation();
        const d = document.getElementById('f-day').value;
        const m = document.getElementById('f-month').value;
        const y = document.getElementById('f-year').value;
        if(y && m && d) {
            document.getElementById('date-display').textContent = `${d}/${m}/${y}`;
            state.filters.start_from = `${y}-${m}-${d}`;
        } else {
            document.getElementById('date-display').textContent = '--';
            state.filters.start_from = '';
        }
        document.getElementById('date-overlay').classList.remove('active');
        state.offset = 0;
        load();
    });

    document.getElementById('btn-reset').addEventListener('click', () => location.reload());

    document.getElementById('prev-btn').addEventListener('click', () => {
        state.offset -= state.limit;
        load();
        window.scrollTo(0,0);
    });

    document.getElementById('next-btn').addEventListener('click', () => {
        state.offset += state.limit;
        load();
        window.scrollTo(0,0);
    });

    // Populate date selects and init
    const daySelect = document.getElementById('f-day');
    for(let i=1; i<=31; i++) { let val = i < 10 ? '0'+i : i; daySelect.innerHTML += `<option value="${val}">${val}</option>`; }
    const monthSelect = document.getElementById('f-month');
    const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
    months.forEach((m, i) => { let val = (i+1) < 10 ? '0'+(i+1) : (i+1); monthSelect.innerHTML += `<option value="${val}">${m}</option>`; });
    const yearSelect = document.getElementById('f-year');
    for(let i=1940; i>=1870; i--) { yearSelect.innerHTML += `<option value="${i}">${i}</option>`; }

    load();

    /* ── PERMALINK & DETAIL VIEW ─────────────────────────────────────────── */

    async function openDetail(personId, event) {
      // Don't open detail if clicking an <a> link inside the row
      if (event && event.target.closest('a')) return;

      window.location.hash = personId;
      showDetail(personId);
    }

    async function showDetail(personId) {
      const overlay = document.getElementById('detail-overlay');
      const content = document.getElementById('detail-content');
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      content.innerHTML = '<div style="padding:80px;text-align:center;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:0.1em;">Chargement…</div>';

      // Set permalink button
      const permalinkBtn = document.getElementById('detail-permalink-btn');
      const permalinkUrl = `${location.origin}${location.pathname}#${personId}`;
      permalinkBtn.href = permalinkUrl;
      permalinkBtn.onclick = (e) => {
        e.preventDefault();
        navigator.clipboard.writeText(permalinkUrl).then(() => {
          const toast = document.getElementById('copy-toast');
          toast.classList.add('visible');
          setTimeout(() => toast.classList.remove('visible'), 2000);
        });
      };

      try {
        const res = await fetch(`${API_BASE}/persons/${personId}`);
        if (!res.ok) throw new Error("Not found");
        const p = await res.json();
        const imgUrl = await getWikiImg(p.wikidata_qid);

        const inst = (m) => {
          const i = (m.institution || '').toLowerCase();
          return i.includes('senat') ? `Sénateur — ${m.position || ''}` : i.includes('chambre') ? `Député — ${m.position || ''}` : m.position || m.institution;
        };

        content.innerHTML = `
          <div class="detail-header">
            <div class="detail-portrait">
              ${imgUrl ? `<img src="${imgUrl}">` : ''}
            </div>
            <div class="detail-identity">
              <div class="detail-firstname">${p.first_name || ''}</div>
              <div class="detail-lastname">${p.last_name}</div>
              <div class="detail-meta">
                ${p.birth_date ? `Né le ${formatDate(p.birth_date)}` : ''}
                ${p.death_date ? `&nbsp;·&nbsp; Mort le ${formatDate(p.death_date)}` : ''}
                ${p.alias ? `<br>Alias : ${p.alias}` : ''}
              </div>
              <div class="detail-links">
                ${p.wikipedia_url ? `<a href="${p.wikipedia_url}" target="_blank">Wikipedia ${SVG_LINK}</a>` : ''}
                ${p.wikidata_qid ? `<a href="https://www.wikidata.org/wiki/${p.wikidata_qid}" target="_blank">Wikidata ${SVG_LINK}</a>` : ''}
                ${p.sycomore_id ? `<a href="https://www2.assemblee-nationale.fr/sycomore/fiche/(num_dept)/${p.sycomore_id}" target="_blank">A.N. ${SVG_LINK}</a>` : ''}
                ${p.senat_id ? `<a href="https://www.senat.fr/senateur/${p.senat_id}" target="_blank">Sénat ${SVG_LINK}</a>` : ''}
              </div>
            </div>
          </div>
          <div class="detail-mandates">
            <div class="detail-mandates-title">${(p.mandates || []).length} mandat${(p.mandates || []).length > 1 ? 's' : ''}</div>
            ${(p.mandates || []).map(m => `
              <div class="detail-mandate-item">
                <div class="detail-mandate-dates">
                  ${formatDate(m.start_date)}<br>→ ${formatDate(m.end_date)}
                </div>
                <div class="detail-mandate-info">
                  <b>${m.legislature_name}</b>
                  ${inst(m)}
                  ${m.group ? `<br><span style="color:var(--muted);font-size:12px">Groupe : ${m.group}</span>` : ''}
                </div>
              </div>`).join('')}
          </div>`;
      } catch(e) {
        content.innerHTML = '<div style="padding:80px;text-align:center;color:var(--muted);">Personne introuvable.</div>';
      }
    }

    function closeDetail() {
      document.getElementById('detail-overlay').classList.remove('active');
      document.body.style.overflow = '';
      history.pushState('', document.title, window.location.pathname + window.location.search);
    }

    document.getElementById('detail-back').addEventListener('click', closeDetail);

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDetail();
    });

    // On page load, check hash for direct permalink
    if (window.location.hash) {
      const personId = window.location.hash.slice(1);
      if (personId) showDetail(personId);
    }
  </script>
</body>
</html>
